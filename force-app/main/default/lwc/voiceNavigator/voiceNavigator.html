<template>
    <lightning-card title="Voice Navigator" icon-name="utility:voice">
        <div class="slds-p-around_medium">
            <iframe src={speechEngineUrl} class="voice-iframe" lwc:ref="voiceFrame" allow="microphone *"></iframe>

            <div class="slds-grid slds-grid_align-center slds-m-bottom_small">
                <button class={micButtonClass}
                        onclick={toggleListening}
                        aria-label="Toggle voice recognition"
                        title="Click to speak | ⌥+Space | Ctrl+Space">
                    <template if:false={isListening}>
                        <svg class="mic-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
                        </svg>
                    </template>
                    <template if:true={isListening}>
                        <svg class="mic-svg mic-svg-active" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                            <rect x="6" y="4" width="12" height="16" rx="2"/>
                        </svg>
                    </template>
                </button>
            </div>

            <template if:true={isListening}>
                <div class="sound-wave-container fade-in">
                    <div class="sound-bar"></div>
                    <div class="sound-bar"></div>
                    <div class="sound-bar"></div>
                    <div class="sound-bar"></div>
                    <div class="sound-bar"></div>
                </div>
            </template>

            <div class="slds-text-align_center slds-m-bottom_small">
                <p class="shortcut-hint">{shortcutHint}</p>
                <template if:false={lastTranscript}>
                    <p class="welcome-hint">Try saying "Go to accounts" or "Find Acme"</p>
                </template>
            </div>

            <div class="slds-text-align_center slds-m-bottom_small" role="status" aria-live="polite">
                <span class={statusBadgeClass}>
                    <template if:true={showStatusDot}>
                        <span class="status-dot"></span>
                    </template>
                    <template if:true={isSearching}>
                        <lightning-spinner alternative-text="Processing" size="xx-small"></lightning-spinner>
                    </template>
                    {status}
                </span>
            </div>

            <template if:true={lastTranscript}>
                <div class="slds-box slds-theme_shade slds-m-bottom_small fade-in">
                    <p class="slds-text-body_small slds-text-color_weak">Last Command:</p>
                    <p class="slds-text-body_regular">{transcriptText}</p>
                    <template if:true={confidenceValue}>
                        <div class="confidence-container" aria-label="Speech confidence level">
                            <div class="confidence-bar-bg">
                                <div class={confidenceBarClass} style={confidenceBarWidth}></div>
                            </div>
                            <span class={confidenceLabelClass}>{confidenceDisplay}</span>
                        </div>
                    </template>
                </div>
            </template>

            <template if:true={actionMessage}>
                <div class="slds-box slds-theme_success slds-m-bottom_small fade-in">
                    <p class="slds-text-body_small">{actionMessage}</p>
                </div>
            </template>

            <template if:true={isSearching}>
                <div class="slds-m-bottom_small slds-text-align_center fade-in">
                    <lightning-spinner alternative-text="Searching" size="small"></lightning-spinner>
                    <p class="slds-text-body_small slds-m-top_x-small">Searching...</p>
                </div>
            </template>

            <template if:true={hasSearchResults}>
                <div class="slds-box slds-m-bottom_small search-results-container fade-in">
                    <p class="slds-text-title_caps slds-m-bottom_x-small">Search Results</p>
                    <ul class="slds-has-dividers_bottom-space">
                        <template for:each={searchResults} for:item="result">
                            <li key={result.id} class="slds-item search-result-item"
                                data-record-id={result.id} onclick={handleSearchResultClick}>
                                <div class="slds-grid slds-grid_vertical-align-center">
                                    <div class="slds-col">
                                        <p class="slds-text-body_regular search-result-name">
                                            {result.name}
                                        </p>
                                        <p class="slds-text-body_small slds-text-color_weak">
                                            {result.objectType}
                                        </p>
                                    </div>
                                    <div class="slds-col_bump-left">
                                        <lightning-icon icon-name="utility:chevronright" size="x-small"></lightning-icon>
                                    </div>
                                </div>
                            </li>
                        </template>
                    </ul>
                </div>
            </template>

            <template if:true={errorMessage}>
                <div class="slds-box slds-theme_error slds-m-bottom_small fade-in">
                    <p class="slds-text-body_small">{errorMessage}</p>
                </div>
            </template>

            <div class="slds-m-top_medium">
                <lightning-accordion allow-multiple-sections-open>
                    <lightning-accordion-section name="help" label="Voice Commands Help">
                        <div class="slds-text-body_small">
                            <p class="slds-m-bottom_xx-small"><strong>Navigation:</strong></p>
                            <p class="slds-m-bottom_xx-small">"Go to accounts" / "Open contacts" / "Navigate to opportunities"</p>
                            <p class="slds-m-bottom_xx-small">"Jump to leads" / "Visit cases" / "Head to campaigns"</p>

                            <p class="slds-m-top_small slds-m-bottom_xx-small"><strong>Create Record:</strong></p>
                            <p class="slds-m-bottom_xx-small">"Create new account" / "New contact" / "Add a lead"</p>

                            <p class="slds-m-top_small slds-m-bottom_xx-small"><strong>Search Records:</strong></p>
                            <p class="slds-m-bottom_xx-small">"Find account Acme" / "Search contact John" / "Look up opportunity"</p>

                            <p class="slds-m-top_small slds-m-bottom_xx-small"><strong>Object Manager Pages:</strong></p>
                            <p class="slds-m-bottom_xx-small">"Show account page layouts" / "Contact validation rules"</p>
                            <p class="slds-m-bottom_xx-small">"Create field on account" / "Show account fields"</p>

                            <p class="slds-m-top_small slds-m-bottom_xx-small"><strong>Setup Pages:</strong></p>
                            <p class="slds-m-bottom_xx-small">"Open users" / "Go to profiles" / "Jump to permission sets"</p>
                            <p class="slds-m-bottom_xx-small">"Visit flows" / "Apex classes" / "Debug logs"</p>

                            <p class="slds-m-top_small slds-m-bottom_xx-small"><strong>Reports &amp; Dashboards:</strong></p>
                            <p class="slds-m-bottom_xx-small">"Open reports" / "Go to dashboards"</p>
                        </div>
                    </lightning-accordion-section>
                </lightning-accordion>
            </div>
        </div>
    </lightning-card>
</template>
