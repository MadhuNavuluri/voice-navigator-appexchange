<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Recognition Engine</title>
    <style>
        body { margin: 0; padding: 0; background: transparent; }
    </style>
</head>
<body>
<script>
    'use strict';

    let recognition = null;
    let speechSupported = false;

    try {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';
            recognition.maxAlternatives = 3;
            speechSupported = true;
        }
    } catch (e) {
        speechSupported = false;
    }

    window.parent.postMessage({
        type: 'voiceSpeechSupport',
        supported: speechSupported
    }, '*');

    if (recognition) {
        recognition.onstart = function() {
            window.parent.postMessage({ type: 'voiceStatus', status: 'listening' }, '*');
        };

        recognition.onresult = function(event) {
            const transcript = event.results[0][0].transcript;
            const confidence = event.results[0][0].confidence;
            window.parent.postMessage({
                type: 'voiceResult',
                transcript: transcript,
                confidence: confidence
            }, '*');
        };

        recognition.onerror = function(event) {
            window.parent.postMessage({
                type: 'voiceError',
                error: event.error
            }, '*');
        };

        recognition.onend = function() {
            window.parent.postMessage({ type: 'voiceStatus', status: 'ended' }, '*');
        };
    }

    window.addEventListener('message', function(event) {
        if (event.origin !== window.location.origin) return;
        if (!event.data || !event.data.action) return;

        if (event.data.action === 'start' && recognition) {
            if (window.speechSynthesis) {
                window.speechSynthesis.cancel();
            }
            try {
                recognition.start();
            } catch (e) {
                recognition.stop();
                setTimeout(function() {
                    recognition.start();
                }, 200);
            }
        }
        if (event.data.action === 'stop' && recognition) {
            try {
                recognition.stop();
            } catch (e) { /* already stopped */ }
        }
        if (event.data.action === 'speak') {
            try {
                if (window.speechSynthesis) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(event.data.text);
                    utterance.lang = 'en-US';
                    utterance.rate = 1.0;
                    utterance.pitch = 1.0;
                    utterance.volume = 0.8;
                    window.speechSynthesis.speak(utterance);
                }
            } catch (e) { /* synthesis unavailable */ }
        }
    });
</script>
</body>
</html>
